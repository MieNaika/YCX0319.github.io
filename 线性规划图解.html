<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二题：最小化问题 图解法 (可拖拽目标函数)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: #e2eaf6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-box {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -10px rgba(0,30,70,0.3);
            padding: 30px 35px;
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            margin-top: 0;
            font-weight: 650;
            font-size: 2.2rem;
            color: #0b2f4e;
            display: flex;
            align-items: center;
            gap: 14px;
            letter-spacing: -0.3px;
        }
        h1 small {
            font-size: 1.1rem;
            background: #1b4c6e;
            color: white;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 400;
        }
        .problem-bar {
            background: white;
            border-radius: 32px;
            padding: 20px 28px;
            margin: 20px 0 25px;
            box-shadow: inset 0 1px 5px #bdd0e8, 0 12px 24px -12px #1a3f60;
        }
        .problem-math {
            font-size: 1.3rem;
            background: #e6f0fa;
            padding: 14px 25px;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
        }
        .problem-math .min { color: #c44536; font-weight: 700; }
        .constraints {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px 50px;
            font-size: 1.2rem;
        }
        .canvas-wrapper {
            background: #ffffffdb;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 30px -10px #0b2d4b;
            border: 2px solid white;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 28px;
            cursor: grab;
            touch-action: none;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
        }
        canvas:active {
            cursor: grabbing;
        }
        .legend-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 50px;
            margin: 20px 0 10px;
            padding: 12px 25px;
            background: #dfebf7;
            border-radius: 60px;
            align-items: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dot {
            width: 26px;
            height: 26px;
            border-radius: 8px;
        }
        .dot.red-line { background: #e03a3a; height: 5px; width: 40px; border-radius: 20px; }
        .dot.dash-blue { border-bottom: 4px dashed #1f6390; width: 40px; height: 5px; }
        .dot.blue-bg { background: #a7c9ff; opacity: 0.6; border-radius: 6px; }
        .dot.black-point { background: #1e2f3f; border-radius: 50%; width: 16px; height: 16px; }

        .control-panel {
            background: #10324b;
            color: white;
            border-radius: 60px;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .drag-hint {
            background: #265e83;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 400;
        }
        .drag-hint i { font-style: normal; color: #ffcf8a; margin-right: 6px; }
        .answer-badge {
            background: #1e4f6e;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 1.4rem;
            font-weight: 600;
        }
        .answer-badge span {
            color: #fec576;
        }
        .footer-note {
            margin-top: 22px;
            text-align: center;
            color: #254d6b;
            background: #d7e5f7;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
<div class="main-box">
    <h1>
        📉 最小化问题 · 图解法
        <small>第二题：唯一最优解</small>
    </h1>
    <div class="problem-bar">
        <div class="problem-math">
            <span class="min">min</span> z = x₁ + 1.5 x₂
        </div>
        <div class="constraints">
            <span>🔹 x₁ + 3x₂ ≥ 3</span>
            <span>🔹 x₁ + x₂ ≥ 2</span>
            <span>🔹 x₁, x₂ ≥ 0</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="quizCanvas" width="800" height="600"></canvas>
    </div>

    <!-- 图例区 -->
    <div class="legend-row">
        <div class="legend-item"><div class="dot blue-bg"></div> 可行域 (淡蓝色阴影)</div>
        <div class="legend-item"><div class="dot dash-blue"></div> 约束边界 (虚线)</div>
        <div class="legend-item"><div class="dot red-line"></div> 目标函数 z = x₁ + 1.5x₂ (可拖动)</div>
        <div class="legend-item"><div class="dot black-point"></div> 顶点 / 最优解 (1.5, 0.5)</div>
    </div>

    <!-- 控制栏 + 答案 -->
    <div class="control-panel">
        <div class="drag-hint">
            <i>🖱️</i> 鼠标拖动画布 → 平移红色目标线 (越低越优)
        </div>
        <div class="answer-badge" id="solutionDisplay">
            ✅ <span>唯一最优解 (1.5, 0.5)  z = 2.25</span>
        </div>
    </div>

    <div class="footer-note">
        ✨ 向下拖动红色线，观察其离开可行域的瞬间 —— 最低点即为最优解 (1.5,0.5)  z = 2.25 。问题具有唯一最优解。
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('quizCanvas');
        const ctx = canvas.getContext('2d');
        const w = 800, h = 600;

        // 数学坐标系范围: x:0~5, y:0~5  (足够覆盖所有约束交点)
        const padding = 70;
        const xMin = 0, xMax = 5.0, yMin = 0, yMax = 5.0;

        function toCanvasX(px) {
            return padding + (px / xMax) * (w - 2 * padding);
        }
        function toCanvasY(py) {
            return h - padding - (py / yMax) * (h - 2 * padding);
        }
        function toMathX(cx) {
            return ((cx - padding) / (w - 2 * padding)) * xMax;
        }
        function toMathY(cy) {
            return ((h - padding - cy) / (h - 2 * padding)) * yMax;
        }

        // 约束条件 (不等式为 ≥)
        // 1) x1 + 3x2 ≥ 3   => 直线: x2 = (3 - x1)/3   (但阴影是上方)
        // 2) x1 + x2 ≥ 2     => 直线: x2 = 2 - x1
        // 非负

        // 目标函数: z = x1 + 1.5 x2   => 写成 x2 = (z - x1)/1.5 = - (2/3)x1 + (2/3)z
        // 我们用截距形式: 令 b = (2/3)z , 则 x2 = - (2/3) x1 + b
        // 但为了直观平移，保存当前z值，初始设置在最优解处 z=2.25 附近

        let currentZ = 2.25;      // 数学z
        let isDragging = false;
        let lastMouseY = 0;

        // ---- 鼠标拖动修改 currentZ ----
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseY = e.clientY;
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaY = e.clientY - lastMouseY;
            // 鼠标向下(deltaY正) → 希望目标函数向下平移 → 数学z减小
            const scale = yMax / (h - 2 * padding); // 每个像素对应数学高度
            const deltaZ = -deltaY * scale * 1.2;   // 乘以1.2让拖动灵敏些
            currentZ += deltaZ;
            // 限制范围，避免线跑出视野太多
            if (currentZ < 0.2) currentZ = 0.2;
            if (currentZ > 6.0) currentZ = 6.0;

            lastMouseY = e.clientY;
            drawCanvas();
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        window.addEventListener('mouseleave', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        canvas.addEventListener('mouseenter', () => {
            if (!isDragging) canvas.style.cursor = 'grab';
        });

        // 绘制全部
        function drawCanvas() {
            ctx.clearRect(0, 0, w, h);

            // 浅灰网格 (每0.5单位)
            ctx.save();
            ctx.strokeStyle = '#e0e6f0';
            ctx.lineWidth = 0.8;
            for (let i = 0; i <= xMax; i+=0.5) {
                ctx.beginPath();
                ctx.moveTo(toCanvasX(i), toCanvasY(0));
                ctx.lineTo(toCanvasX(i), toCanvasY(yMax));
                ctx.stroke();
            }
            for (let j = 0; j <= yMax; j+=0.5) {
                ctx.beginPath();
                ctx.moveTo(toCanvasX(0), toCanvasY(j));
                ctx.lineTo(toCanvasX(xMax), toCanvasY(j));
                ctx.stroke();
            }
            ctx.restore();

            // 坐标轴
            ctx.beginPath();
            ctx.lineWidth = 2.2;
            ctx.strokeStyle = '#2d4b65';
            ctx.moveTo(toCanvasX(0), toCanvasY(0));
            ctx.lineTo(toCanvasX(xMax), toCanvasY(0));
            ctx.stroke();
            ctx.moveTo(toCanvasX(0), toCanvasY(0));
            ctx.lineTo(toCanvasX(0), toCanvasY(yMax));
            ctx.stroke();
            ctx.fillStyle = '#1f3b50';
            ctx.font = 'bold 14px "Segoe UI"';
            ctx.fillText('x₁', toCanvasX(4.7), toCanvasY(-0.15));
            ctx.fillText('x₂', toCanvasX(-0.2), toCanvasY(4.7));

            // 绘制可行域阴影 (满足所有 ≥ 约束的区域)
            // 可行域由 x1+3x2≥3 , x1+x2≥2 , x1≥0 , x2≥0 围成
            // 顶点: (0,2) , (1.5,0.5) , (3,0) 以及向右上无限延伸。
            // 为了画多边形阴影，取一个足够大的边界点 (5,5) 确保包含
            const topRight = {x:5, y:5};   // 5,5 满足所有约束吗？ 5+15=20≥3，5+5=10≥2，是的。
            // 多边形按逆时针: (0,2) → (1.5,0.5) → (3,0) → (5,0) → (5,5) → (0,5) → 回到(0,2)
            const shadowPoly = [
                {x:0, y:2},
                {x:1.5, y:0.5},
                {x:3, y:0},
                {x:5, y:0},
                {x:5, y:5},
                {x:0, y:5}
            ];
            ctx.beginPath();
            ctx.fillStyle = '#b0d2ff';
            ctx.globalAlpha = 0.35;
            ctx.moveTo(toCanvasX(shadowPoly[0].x), toCanvasY(shadowPoly[0].y));
            for (let i=1; i<shadowPoly.length; i++) {
                ctx.lineTo(toCanvasX(shadowPoly[i].x), toCanvasY(shadowPoly[i].y));
            }
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;

            // 绘制约束虚线 (只画直线段，表示边界)
            ctx.save();
            ctx.setLineDash([7, 6]);
            ctx.lineWidth = 2.2;
            ctx.strokeStyle = '#1e62b0';

            // 约束1: x1 + 3x2 = 3  →  x2 = (3 - x1)/3
            ctx.beginPath();
            let x1_a = 0, y1_a = 1;    // (0,1)
            let x1_b = 3, y1_b = 0;    // (3,0)
            ctx.moveTo(toCanvasX(x1_a), toCanvasY(y1_a));
            ctx.lineTo(toCanvasX(x1_b), toCanvasY(y1_b));
            ctx.stroke();

            // 约束2: x1 + x2 = 2  →  x2 = 2 - x1
            ctx.beginPath();
            ctx.moveTo(toCanvasX(0), toCanvasY(2));
            ctx.lineTo(toCanvasX(2), toCanvasY(0));
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.restore();

            // 标记顶点 (并显示坐标)
            const vertices = [
                {x:0, y:2, label:'(0,2)'},
                {x:1.5, y:0.5, label:'(1.5,0.5)'},
                {x:3, y:0, label:'(3,0)'}
            ];
            ctx.fillStyle = '#1e3f5c';
            vertices.forEach(v => {
                ctx.beginPath();
                ctx.arc(toCanvasX(v.x), toCanvasY(v.y), 7, 0, 2*Math.PI);
                ctx.fillStyle = '#132e44';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px "Segoe UI"';
                ctx.fillText(v.label, toCanvasX(v.x)+15, toCanvasY(v.y)-10);
            });

            // 绘制目标函数: 红色实线  z = x1 + 1.5 x2
            // 当前z = currentZ
            // 求与画布左右边界的交点 (取x1范围0~5)
            ctx.beginPath();
            ctx.strokeStyle = '#d93838';
            ctx.lineWidth = 3.8;
            ctx.shadowColor = '#ff9f9f';
            ctx.shadowBlur = 8;
            // 直线方程: x2 = (currentZ - x1) / 1.5
            let startX = 0;
            let startY = (currentZ - startX) / 1.5;
            let endX = 5;
            let endY = (currentZ - endX) / 1.5;

            // 裁剪到画布可见范围内 (简单限制y范围防止画到天边)
            if (startY < 0) {
                // 重新计算与x轴交点
                startY = 0;
                startX = currentZ - 1.5 * startY;   // 实际上当y=0, x1 = currentZ
                if (startX < 0) startX = 0; // 防止负
            }
            if (endY < 0) {
                endY = 0;
                endX = currentZ - 1.5 * endY;
                if (endX > 5) endX = 5;
            }
            // 防止y超出顶
            if (startY > 5) { startY = 5; startX = currentZ - 1.5*5; }
            if (endY > 5) { endY = 5; endX = currentZ - 1.5*5; }

            ctx.moveTo(toCanvasX(startX), toCanvasY(startY));
            ctx.lineTo(toCanvasX(endX), toCanvasY(endY));
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 在旁边标注z值
            ctx.font = 'bold 18px "JetBrains Mono"';
            ctx.fillStyle = '#b0302a';
            ctx.fillText(`z = ${currentZ.toFixed(2)}`, toCanvasX(3.8), toCanvasY(4.5));

            // 显示最优解箭头提示 (如果z接近2.25)
            if (Math.abs(currentZ - 2.25) < 0.05) {
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillStyle = '#1d6b3c';
                ctx.fillText('⭐ 最优解位置', toCanvasX(2.2), toCanvasY(1.2));
            }
        }

        // 初始化绘制
        drawCanvas();

        // 可选: 让答案始终显示，不需要额外操作
        // 最优解提示已经写在底栏
    })();
</script>
</body>
</html>
